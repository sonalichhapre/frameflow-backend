projects:
  - name: frameflow
    environments:

      - name: production
        networking:
          isolation: enabled
        permissions:
          protection: enabled
        services:
          - type: web
            name: frameflow-production
            runtime: node
            plan: starter
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /api/health
            autoDeploy: true
            envVars:
              - key: NODE_ENV
                value: production
              - key: ALLOWED_ORIGINS
                value: https://frameflow-production.onrender.com

      - name: staging
        networking:
          isolation: enabled
        services:
          - type: web
            name: frameflow-staging
            runtime: node
            plan: free
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /api/health
            autoDeploy: true
            envVars:
              - key: NODE_ENV
                value: staging
              - key: ALLOWED_ORIGINS
                value: https://frameflow-staging.onrender.com
